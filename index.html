<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Time Experiment</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f7f6; }
        #setup-screen, #results-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 3rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 700px; width: 85%; }
        input { padding: 12px; margin: 15px; border: 2px solid #e0e0e0; border-radius: 8px; width: 260px; font-size: 1rem; outline: none; transition: border 0.3s; }
        input:focus { border-color: #007bff; }
        button { padding: 12px 28px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background-color: #0056b3; transform: translateY(-2px); }
        canvas#taskCanvas { display: none; background: #ffffff; cursor: crosshair; position: absolute; top: 0; left: 0; }
        #results-screen { display: none; background: #f4f7f6; z-index: 10; overflow-y: auto; }
        .chart-container { position: relative; height: 350px; width: 100%; margin-top: 20px; }
        #loader { font-size: 0.9rem; color: #666; margin-top: 10px; }
        .stat-highlight { font-size: 1.5rem; font-weight: bold; color: #007bff; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="card">
            <h1>Reaction Timer</h1>
            <p>10 circles will appear. Click them as fast as possible.</p>
            <input type="text" id="participant-id" placeholder="Participant ID (Optional)">
            <br>
            <button id="start-btn">Start Experiment</button>
        </div>
    </div>

    <canvas id="taskCanvas"></canvas>

    <div id="results-screen">
        <div class="card">
            <h2>Task Complete</h2>
            <div id="user-stats" class="stat-highlight">Calculating...</div>
            <div id="loader">Syncing data with Google Sheets...</div>
            <div class="chart-container">
                <canvas id="histogramChart"></canvas>
            </div>
            <br>
            <button onclick="location.reload()">Restart Task</button>
        </div>
    </div>

    <script>
        const setupScreen = document.getElementById('setup-screen');
        const resultsScreen = document.getElementById('results-screen');
        const startBtn = document.getElementById('start-btn');
        const participantInput = document.getElementById('participant-id');
        const canvas = document.getElementById('taskCanvas');
        const ctx = canvas.getContext('2d');

        const TOTAL_TRIALS = 10;
        const CIRCLE_RADIUS = 50;
        const DELAY_BETWEEN = 500;
        // UPDATED WEB APP URL
        const ENDPOINT = "https://script.google.com/macros/s/AKfycbzvbbe6M_qhLtM13rHs9ZfRbV6IY025su8hxLT8_7lWRZJo_VQjYB_kOxo-LLE-jTe2/exec";

        let trialCount = 0;
        let results = [];
        let startTime, currentX, currentY, participantId;

        startBtn.addEventListener('click', () => {
            participantId = participantInput.value.trim() || "ID-" + Math.random().toString(36).substr(2, 5).toUpperCase();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            
            setupScreen.style.display = 'none';
            canvas.style.display = 'block';
            resizeCanvas();
            setTimeout(spawnCircle, 1000);
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function spawnCircle() {
            if (trialCount >= TOTAL_TRIALS) {
                finishExperiment();
                return;
            }
            currentX = Math.random() * (canvas.width - CIRCLE_RADIUS * 2) + CIRCLE_RADIUS;
            currentY = Math.random() * (canvas.height - CIRCLE_RADIUS * 2) + CIRCLE_RADIUS;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.arc(currentX, currentY, CIRCLE_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = "#ff4757";
            ctx.fill();
            ctx.closePath();
            
            startTime = performance.now();
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            const dist = Math.sqrt((clickX - currentX)**2 + (clickY - currentY)**2);
            
            if (dist < CIRCLE_RADIUS && startTime) {
                const rt = performance.now() - startTime;
                results.push(rt);
                startTime = null;
                trialCount++;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                setTimeout(spawnCircle, DELAY_BETWEEN);
            }
        });

        async function finishExperiment() {
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
            canvas.style.display = 'none';
            resultsScreen.style.display = 'flex';

            const userAvg = results.reduce((a, b) => a + b, 0) / results.length;
            document.getElementById('user-stats').innerText = `Your Average: ${userAvg.toFixed(2)} ms`;

            try {
                // Submit data to Google Sheets
                await fetch(ENDPOINT, {
                    method: 'POST',
                    mode: 'no-cors', // Essential for Google Apps Script POST
                    cache: 'no-cache',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        participantId: participantId,
                        trials: results,
                        timestamp: new Date().toISOString()
                    })
                });

                // Fetch community data for histogram
                const response = await fetch(ENDPOINT);
                const historicalData = await response.json();
                
                document.getElementById('loader').innerText = "Comparison data loaded.";
                renderChart(historicalData, userAvg);
            } catch (err) {
                console.error("Data error:", err);
                document.getElementById('loader').innerText = "Data saved, but could not load histogram.";
                renderChart([userAvg], userAvg);
            }
        }

        function renderChart(allData, userAvg) {
            const binSize = 50;
            const bins = {};
            
            allData.forEach(val => {
                const b = Math.floor(val / binSize) * binSize;
                bins[b] = (bins[b] || 0) + 1;
            });

            const labels = Object.keys(bins).sort((a, b) => a - b);
            const dataPoints = labels.map(l => bins[l]);

            new Chart(document.getElementById('histogramChart'), {
                type: 'bar',
                data: {
                    labels: labels.map(l => `${l}ms`),
                    datasets: [{
                        label: 'Total Participants',
                        data: dataPoints,
                        backgroundColor: 'rgba(0, 123, 255, 0.4)',
                        borderColor: '#007bff',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        annotation: {
                            annotations: {
                                userLine: {
                                    type: 'line',
                                    scaleID: 'x',
                                    value: labels.indexOf(Math.floor(userAvg / binSize) * binSize).toString(),
                                    borderColor: '#ff4757',
                                    borderWidth: 4,
                                    label: {
                                        display: true,
                                        content: 'YOU',
                                        backgroundColor: '#ff4757'
                                    }
                                }
                            }
                        }
                    }
                }
            });
        }

        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
